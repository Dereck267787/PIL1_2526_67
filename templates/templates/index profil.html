<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil</title>
    <link rel="stylesheet" href=" style profil.css">
</head>
<body>
    <header class="page-header">
        <div class="header-left">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
            <h1>Mon Profil</h1>
        </div>
        <button class="btn-header-save">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/>
            </svg>
            Enregistrer
        </button>
    </header>

    <main class="profile-card">
        <form>
            <section class="profile-top">
                <div class="avatar-wrapper">
                    <div class="avatar-circle">U</div>
                    <div class="avatar-badge">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
                            <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                        </svg>
                    </div>
                </div>
                <h2 class="profile-name">Utilisateur</h2>
                <p class="profile-meta">Email et téléphone à renseigner ci-dessous</p>
                <div class="profile-tags">
                    <span class="tag tag-blue">🎓 Niveau à définir</span>
                    <span class="tag tag-green">⚡ Statut</span>
                    <span class="tag tag-orange">🕐 Disponible</span>
                </div>
            </section>

            <section class="profile-form">
                <div class="field">
                    <label for="prenom">PRÉNOM</label>
                    <input type="text" id="prenom" placeholder=" entre ton prénom">
                </div>

                <div class="field">
                    <label for="nom">NOM</label>
                    <input type="text" id="nom" placeholder=" entre ton nom">
                </div>

                <div class="field">
                    <label for="telephone">NUMÉRO DE TÉLÉPHONE</label>
                    <input type="tel" id="telephone" placeholder=" entre ton numéro de téléphone">
                </div>

                <div class="field">
                    <label for="email">ADRESSE E-MAIL</label>
                    <input type="email" id="email" placeholder=" entre ton email">
                </div>

                <div class="field">
                    <label for="filiere">FILIÈRE</label>
                    <select id="filiere">
                        <option value=""> : sélectionne ta filière</option>
                        <option value="gl">Génie Logiciel</option>
                        <option value="ia">Intelligence Artificielle</option>
                        <option value="si">Sécurité Informatique</option>
                        <option value="IM">Internet et Multimédias</option>
                        <option value="autre">Autre</option>    
                    </select>
                </div>

                <div class="field">
                    <label for="niveau">NIVEAU D'ÉTUDES</label>
                    <select id="niveau">
                        <option value=""> : sélectionne ton niveau</option>
                        <option value="l1">L1</option>
                        <option value="l2">L2</option>
                        <option value="l3">L3</option>
                        <option value="m1">M1</option>
                        <option value="m2">M2</option>
                    </select>
                </div>

                <div class="field">
                    <label for="bio">BIO COURTE</label>
                    <textarea id="bio" placeholder=": décris-toi en quelques lignes"></textarea>
                </div>

                <div class="field">
                    <label for="interets">CENTRES D'INTÉRÊT ACADÉMIQUES</label>
                    <input type="text" id="interets" placeholder=": exempleAlgorithmique, Base de données">
                </div>
            </section>

            <section class="form-footer">
                <button type="button" class="btn-cancel">Annuler</button>
                <button type="submit" class="btn-submit">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/>
                    </svg>
                    Enregistrer les modifications
                </button>
            </section>
        </form>
    </main>
</body>
</html>
