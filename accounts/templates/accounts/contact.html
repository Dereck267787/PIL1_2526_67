{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nous Contacter - MentorLink</title>
    <link rel="stylesheet" href="{% static 'accounts/style3.css' %}">
</head>
<body>

    <nav style="position: absolute; top: 0; left: 0; width: 100%; background-color: #1e293b; padding: 15px 0; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box; z-index: 1000;">
        <a href="/" style="color: white; text-decoration: none; margin: 0 15px; font-weight: bold; font-family: sans-serif;">🏠 Accueil</a>
        <a href="/profil/" style="color: white; text-decoration: none; margin: 0 15px; font-weight: bold; font-family: sans-serif;">👤 Mon Profil</a>
        <a href="/matching/" style="color: white; text-decoration: none; margin: 0 15px; font-weight: bold; font-family: sans-serif;">🔍 Matches</a>
        <a href="/offres/" style="color: white; text-decoration: none; margin: 0 15px; font-weight: bold; font-family: sans-serif;">📋 Offres</a>
        <a href="/chat/" style="color: white; text-decoration: none; margin: 0 15px; font-weight: bold; font-family: sans-serif;">💬 Messages</a>
    </nav>

    <div style="margin-top: 80px;" class="form-container">
        <form class="contact-form" method="POST" action="">
            {% csrf_token %}
            
            <div class="form-row">
                <div class="form-group">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" name="nom" placeholder="KIKI CISSE" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Adresse email</label>
                    <input type="email" id="email" name="email" placeholder="jeabj@univ-ouaga.bj" required>
                </div>
            </div>
            
            <div class="form-row-single">
                <div class="form-group-half">
                    <label for="prenom-seul">Prénom</label>
                    <input type="text" id="prenom-seul" name="prenom" placeholder="Aminata" required>
                </div>
            </div>

            <div class="form-group">
                <label for="sujet">Sujet</label>
                <select id="sujet" name="sujet" required>
                    <option value="" disabled selected>Sélectionne un sujet</option>
                    <option value="info">Demande d'information</option>
                    <option value="support">Support technique</option>
                    <option value="autre">Autre</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">Mot de passe (Optionnel)</label>
                    <input type="password" id="password" name="password" placeholder="Minimum 8 caractères">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirmer le mot de passe</label>
                    <input type="password" id="confirm-password" name="confirm_password" placeholder="Retape ton mot de passe">
                </div>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6" placeholder="Décris ta demande, ta filière et ce dont tu as besoin..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">
                Envoyer le message 
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </form>
    </div>
</body>
</html>
