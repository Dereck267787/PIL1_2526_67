<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offres & Demandes</title>
    <link rel="stylesheet" href="style offre.css">
</head>
<body>
    <header class="page-header">
        <div class="header-left">
            <span class="header-icon">📋</span>
            <h1>Offres &<br>Demandes</h1>
        </div>
        <button class="btn-new" id="btn-toggle-form">+ Nouvelle offre<br>/ demande</button>
    </header>

    <main class="container">
        <!-- FORMULAIRE AJOUT -->
        <section class="card form-card" id="form-section" style="display: none;">
            <div class="card-title">
                <h2>Créer une offre ou demande</h2>
            </div>
            
            <form id="offer-form">
                <div class="field">
                    <label for="type">Type</label>
                    <select id="type" required>
                        <option value="offre">Offre d'aide</option>
                        <option value="demande">Demande d'aide</option>
                    </select>
                </div>

                <div class="field">
                    <label for="titre">Titre</label>
                    <input type="text" id="titre" placeholder="Ex: Aide en Python — algorithmes de tri" required>
                </div>

                <div class="field">
                    <label for="nom">Ton nom</label>
                    <input type="text" id="nom" placeholder="Ex: Sènan Koffi" required>
                </div>

                <div class="field">
                    <label for="niveau">Niveau/Filière</label>
                    <input type="text" id="niveau" placeholder="Ex: M1 GL" required>
                </div>

                <div class="field">
                    <label for="tags">Matières/Tags</label>
                    <input type="text" id="tags" placeholder="Ex: Python, Algorithmique — séparés par une virgule" required>
                </div>

                <div class="field">
                    <label for="dispo">Disponibilités</label>
                    <input type="text" id="dispo" placeholder="Ex: Lundi & Mercredi" required>
                </div>

                <div class="field">
                    <label for="format">Format</label>
                    <select id="format" required>
                        <option value="En ligne">En ligne</option>
                        <option value="Présentiel">Présentiel</option>
                        <option value="Présentiel ou en ligne">Présentiel ou en ligne</option>
                        <option value="Flexible">Flexible</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">Publier</button>
            </form>
        </section>

        <!-- TABS -->
        <nav class="tabs">
            <button class="tab active" data-tab="offres">
                <span class="tab-icon">📦</span>
                Offres
            </button>
            <button class="tab" data-tab="demandes">
                <span class="tab-icon">📦</span>
                Demandes
            </button>
            <button class="tab" data-tab="publications">
                <span class="tab-icon">👤</span>
                Mes publications
            </button>
        </nav>

        <!-- LISTE DES OFFRES -->
        <div class="offers-list" id="offers-list">
            <!-- Les offres ajoutées via le form iront ici -->
        </div>
    </main>

<script>
const formSection = document.getElementById('form-section');
const btnToggle = document.getElementById('btn-toggle-form');
const form = document.getElementById('offer-form');
const offersList = document.getElementById('offers-list');

btnToggle.addEventListener('click', () => {
    formSection.style.display = formSection.style.display === 'none' ? 'block' : 'none';
});

form.addEventListener('submit', (e) => {
    e.preventDefault();
    
    const data = {
        type: document.getElementById('type').value,
        titre: document.getElementById('titre').value,
        nom: document.getElementById('nom').value,
        niveau: document.getElementById('niveau').value,
        tags: document.getElementById('tags').value.split(',').map(t => t.trim()),
        dispo: document.getElementById('dispo').value,
        format: document.getElementById('format').value
    };

    const tagColors = ['tag-blue', 'tag-green', 'tag-gray', 'tag-orange'];
    const tagsHTML = data.tags.map((tag, i) => 
        `<span class="tag ${tagColors[i % tagColors.length]}">${tag}</span>`
    ).join('');

    const cardHTML = `
        <article class="offer-card">
            <div class="offer-top">
                <div class="offer-info">
                    <h3 class="offer-title">${data.titre}</h3>
                    <p class="offer-author">par ${data.nom} • ${data.niveau}</p>
                </div>
                <span class="status-tag status-open">Ouverte</span>
            </div>
            <div class="tags">${tagsHTML}</div>
            <div class="offer-bottom">
                <div class="offer-meta">
                    <span class="meta-icon">📅</span>
                    <span class="meta-text">${data.dispo} • ${data.format}</span>
                </div>
                <button class="btn-repondre">Répondre</button>
            </div>
        </article>
    `;
    
    offersList.insertAdjacentHTML('afterbegin', cardHTML);
    form.reset();
    formSection.style.display = 'none';
});
</script>
</body>
</html>
